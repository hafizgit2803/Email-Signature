<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Shahana Group — Signature Generator</title>
<style>
:root{--ink:#1d1d1f;--sub:#6e6e73;--line:#d2d2d7;--bg:#f5f5f7;--card:#fff;--field:#fbfbfd;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
.app{display:grid;grid-template-columns:360px 1fr;min-height:100vh}
@media(max-width:860px){.app{grid-template-columns:1fr}}
.panel{background:var(--card);border-right:1px solid var(--line);padding:34px 28px 60px;overflow-y:auto;}
.panel h1{font-size:21px;font-weight:600;letter-spacing:-.02em}
.panel .sub{color:var(--sub);font-size:13px;margin-top:5px;margin-bottom:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--sub);margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em}
.field input[type=text]{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;
  font-size:14px;font-family:inherit;color:var(--ink);background:var(--field);transition:border-color .15s,box-shadow .15s;}
.field input[type=text]:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(29,29,31,.1)}
.compound{display:flex}
.compound input{border-radius:11px 0 0 11px;border-right:none;flex:1;min-width:0;}
.chip{flex:none;padding:11px 12px;background:var(--field);border:1px solid var(--line);
  border-radius:0 11px 11px 0;color:var(--sub);font-size:13.5px;white-space:nowrap;}
.mobilerow{display:flex;margin-bottom:9px;}
.mobilerow .prefix{flex:none;padding:11px 11px;background:var(--field);border:1px solid var(--line);
  border-radius:11px 0 0 11px;color:var(--sub);font-size:13.5px;border-right:none;}
.mobilerow input{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:0 11px 11px 0;
  font-size:14px;font-family:inherit;color:var(--ink);background:var(--field);min-width:0;transition:border-color .15s;}
.mobilerow input:focus{outline:none;border-color:var(--ink)}
.mobilerow .rm{flex:none;margin-left:8px;width:44px;border:1px solid var(--line);
  background:var(--field);border-radius:10px;color:var(--sub);cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;transition:.15s;font-family:inherit}
.mobilerow .rm:hover{background:#fdecea;color:#d9534f;border-color:#f3c8c4}
.addbtn{background:none;border:none;color:var(--ink);font-size:13px;font-weight:600;
  cursor:pointer;padding:3px 0;font-family:inherit;text-decoration:underline;text-underline-offset:3px;}
.copybtn{width:100%;margin-top:8px;padding:13px;border:none;border-radius:12px;
  background:var(--ink);color:#fff;font-size:14.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:.15s;}
.copybtn:hover{background:#000;transform:translateY(-1px)}
.copybtn.ok{background:#1a9e5c}
.hint{font-size:11.5px;color:var(--sub);margin-top:10px;line-height:1.7}
.hint b{font-weight:600;color:var(--ink)}
.stage{display:flex;align-items:flex-start;justify-content:center;padding:52px 40px;background:#fff;}
.stagewrap{max-width:700px;width:100%}
.stagelabel{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--sub);margin-bottom:16px}
.preview-card{display:inline-block;padding:36px 40px;}
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <h1>Signature generator</h1>
    <div class="sub">Shahana Group &middot; M.T. Sweaters &amp; Banga Fashion</div>
    <div class="field"><label>Full name</label>
      <input type="text" id="fName" value="Shahana Rahman"></div>
    <div class="field"><label>Designation</label>
      <input type="text" id="fTitle" value="Managing Director"></div>
    <div class="field">
      <label>Mobile number(s)</label>
      <div id="mobileList"></div>
      <button class="addbtn" id="addBtn">+ Add another number</button>
    </div>
    <div class="field"><label>Email</label>
      <div class="compound">
        <input type="text" id="fEmail" placeholder="username">
        <span class="chip">@shahanagroup.com</span>
      </div>
    </div>
    <button class="copybtn" id="copyBtn">Copy signature</button>
    <div class="hint">
      Click copy, then paste directly into:<br>
      <b>Gmail</b> — Settings → See all settings → Signature<br>
      <b>Outlook</b> — File → Options → Mail → Signatures<br>
      <b>Apple Mail</b> — Settings → Signatures
    </div>
  </div>
  <div class="stage">
    <div class="stagewrap">
      <div class="stagelabel">Live preview</div>
      <div class="preview-card"><div id="preview"></div></div>
    </div>
  </div>
</div>

var ROW_M = '<tr>\n      <td style="font-size:13px;font-weight:700;color:#1d1d1f;padding-right:12px;padding-bottom:5px;vertical-align:top;white-space:nowrap;">M</td>\n      <td style="font-size:16.5px;color:#3a3a3c;padding-bottom:5px;">+880&nbsp;{{NUM}}</td>\n    </tr>';
var ROW_E = '<tr>\n      <td style="font-size:13px;font-weight:700;color:#1d1d1f;padding-right:12px;padding-bottom:5px;vertical-align:top;white-space:nowrap;">E</td>\n      <td style="font-size:16.5px;color:#3a3a3c;padding-bottom:5px;"><a href="mailto:{{EMAIL}}" style="color:#3a3a3c;text-decoration:none;">{{EMAIL}}</a></td>\n    </tr>';
var ROW_W = '<tr>\n      <td style="font-size:13px;font-weight:700;color:#1d1d1f;padding-right:12px;padding-bottom:5px;vertical-align:top;white-space:nowrap;">W</td>\n      <td style="font-size:16.5px;color:#3a3a3c;padding-bottom:5px;"><a href="https://www.shahanagroup.com" style="color:#3a3a3c;text-decoration:none;">www.shahanagroup.com</a></td>\n    </tr>';
var ROW_A = '<tr>\n      <td style="font-size:13px;font-weight:700;color:#1d1d1f;padding-right:12px;padding-bottom:5px;vertical-align:top;white-space:nowrap;">A</td>\n      <td style="font-size:16.5px;color:#3a3a3c;padding-bottom:5px;">Plot# 1703-1704, Gacha, Gazipur Sadar, Gazipur, Bangladesh</td>\n    </tr>';

function $(id){return document.getElementById(id);}
function val(id){return $(id).value.trim();}
function esc(s){return s.replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

function addMobileRow(v){
  var first=$("mobileList").children.length===0;
  var row=document.createElement("div"); row.className="mobilerow";
  var pre=document.createElement("span"); pre.className="prefix"; pre.textContent="+880";
  row.appendChild(pre);
  var inp=document.createElement("input"); inp.type="text"; inp.value=v||""; inp.placeholder="1XXX-XXXXXX";
  inp.addEventListener("input",render); row.appendChild(inp);
  if(!first){
    var rm=document.createElement("button"); rm.className="rm"; rm.innerHTML="&times;"; rm.type="button";
    rm.addEventListener("click",function(){row.remove();render();});
    row.appendChild(rm);
  }
  $("mobileList").appendChild(row);
}
function getMobiles(){
  return [].map.call($("mobileList").querySelectorAll("input"),function(i){return i.value.trim();}).filter(Boolean);
}
$("addBtn").addEventListener("click",function(){addMobileRow("");render();});
["fName","fTitle","fEmail"].forEach(function(id){$(id).addEventListener("input",render);});

function buildSig(){
  var name  = esc(val("fName")||"Your Name");
  var title = esc(val("fTitle")||"");
  var user  = val("fEmail");
  var email = user ? esc(user)+"@shahanagroup.com" : "";
  var rows  = "";
  getMobiles().forEach(function(n){ rows += ROW_M.replace("{{NUM}}",esc(n)); });
  if(email) rows += ROW_E.replace(/{{EMAIL}}/g, email);
  rows += ROW_W + ROW_A;
  return SIG
    .replace("{{LOGO}}", LOGO)
    .replace("{{NAME}}", name)
    .replace("{{TITLE}}", title)
    .replace("{{ROWS}}", rows);
}

function render(){ $("preview").innerHTML = buildSig(); }

$("copyBtn").addEventListener("click",function(){
  var html=buildSig(), btn=this;
  function done(){
    btn.textContent="Copied! Now paste into your email app ✓";
    btn.classList.add("ok");
    setTimeout(function(){btn.textContent="Copy signature";btn.classList.remove("ok");},3000);
  }
  if(navigator.clipboard && window.ClipboardItem){
    var blob=new Blob([html],{type:"text/html"});
    navigator.clipboard.write([new ClipboardItem({"text/html":blob})])
      .then(done).catch(function(){fallback(html,btn);});
  } else { fallback(html,btn); }
});

function fallback(html,btn){
  var d=document.createElement("div");
  d.contentEditable="true";
  d.style.cssText="position:fixed;left:-9999px;top:-9999px;opacity:0;pointer-events:none;";
  d.innerHTML=html; document.body.appendChild(d); d.focus();
  var range=document.createRange(); range.selectNodeContents(d);
  var sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  var ok=document.execCommand("copy");
  sel.removeAllRanges(); document.body.removeChild(d);
  if(ok){
    btn.textContent="Copied! Now paste into your email app ✓"; btn.classList.add("ok");
    setTimeout(function(){btn.textContent="Copy signature";btn.classList.remove("ok");},3000);
  } else {
    btn.textContent="Select the preview and copy manually (Ctrl+C)";
    setTimeout(function(){btn.textContent="Copy signature";},4000);
  }
}

addMobileRow("1711-000000");
render();
</script>
